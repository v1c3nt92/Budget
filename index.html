<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<meta name="theme-color" content="#0f0f13">
<title>💰 Budget Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:18px 13px 40px;}
h1,h2{font-family:'Syne',sans-serif;}

/* Header avec les disquettes demandées */
.hdr{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:0 5px;}
.hdr-titles h1{font-size:1.9rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-titles p{color:var(--m);font-size:.78rem;margin-top:3px;}
.hdr-tools{display:flex; gap:10px;}
.btn-icon{background:var(--s); border:1px solid var(--b); color:var(--t); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.2rem; transition:0.2s;}
.btn-icon:active{transform:scale(0.9); background:var(--b);}

.saved{font-size:.7rem;color:#43e97b;text-align:center;margin-bottom:10px;opacity:0;transition:opacity .4s;display:block;}
.saved.show{opacity:1;}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.card.pu::before{background:#6c63ff;}.card.pi::before{background:#ff6584;}
.card.gr::before{background:#43e97b;}.card.or::before{background:#ff9f43;}
.cl{font-size:.64rem;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.cv{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;}
.card.pu .cv{color:#6c63ff;}.card.pi .cv{color:#ff6584;}
.card.gr .cv{color:#43e97b;}.card.or .cv{color:#ff9f43;}

.sec{background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden;margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);cursor:pointer;user-select:none;}
.sh h2{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.bk{font-size:.67rem;padding:2px 8px;border-radius:20px;font-weight:500;}
.bk.pu{background:rgba(108,99,255,.18);color:#6c63ff;}.bk.re{background:rgba(255,80,80,.18);color:#ff5050;}
.bk.or{background:rgba(255,159,67,.18);color:#ff9f43;}.bk.cy{background:rgba(67,217,255,.18);color:#43d9ff;}
.bk.pi{background:rgba(255,101,132,.18);color:#ff6584;}.bk.gr{background:rgba(67,233,123,.18);color:#43e97b;}

.cb{overflow:hidden;transition:max-height .3s ease;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:6px 13px;font-size:.64rem;color:var(--m);text-transform:uppercase;background:var(--s2);font-weight:500;}
td{padding:9px 13px;font-size:.83rem;border-bottom:1px solid var(--b);vertical-align:middle;}
.ta{text-align:right;font-family:'Syne',sans-serif;font-weight:600;}
.tac{text-align:right;width:34px;}
.bd{background:none;border:none;cursor:pointer;color:var(--m);font-size:.9rem;}
.ba{background:rgba(108,99,255,.1);border:1px dashed rgba(108,99,255,.35);color:#6c63ff;border-radius:7px;padding:7px;font-size:.76rem;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;}
.ap{padding:7px 13px;}

/* Échéancier style */
.rem-info{font-size:0.6rem;color:var(--m);display:block;margin-top:2px;}
.rem-total{color:#43e97b;font-weight:700;}

/* Modaux */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(3px);}
.mb{background:var(--s);border:1px solid var(--b);border-radius:18px;padding:20px;width:100%;max-width:340px;max-height:88vh;overflow-y:auto;}
.fi{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);border-radius:9px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;margin-bottom:10px;}
.mbt{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px;}
.bco{background:var(--a);border:none;color:#fff;border-radius:9px;padding:10px;font-size:.86rem;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;}
.bc{background:var(--s2);border:1px solid var(--b);color:var(--m);border-radius:9px;padding:10px;cursor:pointer;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-titles">
    <h1>💰 Budget Mensuel</h1>
    <p>Appuie sur un nom ou montant pour modifier</p>
  </div>
  <div class="hdr-tools">
    <button class="btn-icon" onclick="showExport()">💾</button>
    <button class="btn-icon" onclick="showImport()">📥</button>
  </div>
</div>

<span class="saved" id="sv">✅ Données synchronisées</span>

<div class="cards">
  <div class="card pu"><div class="cl">Total mensuel</div><div class="cv" id="ct">—</div></div>
  <div class="card pi"><div class="cl">Part /personne</div><div class="cv" id="ch">—</div></div>
  <div class="card gr"><div class="cl">Dettes restantes</div><div class="cv" id="ca">—</div></div>
  <div class="card or"><div class="cl">Charges annuelles</div><div class="cv" id="cy">—</div></div>
</div>

<div id="sc"></div>

<div class="mo" id="modal" style="display:none">
  <div class="mb">
    <h3 style="margin-bottom:15px; font-family:Syne;">➕ Nouvel élément</h3>
    <input class="fi" id="nn" placeholder="Nom (ex: Buy Way)">
    <input class="fi" id="na" type="number" step="0.01" placeholder="Montant €">
    <input class="fi" id="ne" placeholder="Emoji (ex: 💳)" maxlength="2">
    
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
      <input type="checkbox" id="is-plan" onchange="document.getElementById('plan-fields').style.display = this.checked ? 'block' : 'none'">
      <span style="font-size:0.8rem; color:var(--m)">📅 Activer l'échéancier</span>
    </div>

    <div id="plan-fields" style="display:none; border-left:2px solid var(--a); padding-left:10px; margin-bottom:15px;">
      <label style="font-size:0.6rem; color:var(--m)">MOIS RESTANTS :</label>
      <input class="fi" id="n-months" type="number" value="12">
      <label style="font-size:0.6rem; color:var(--m)">JOUR DE PAIEMENT :</label>
      <input class="fi" id="pay-day" type="number" value="22">
    </div>

    <div class="mbt">
      <button class="bc" onclick="cM()">Fermer</button>
      <button class="bco" onclick="confAdd()">Ajouter ✓</button>
    </div>
  </div>
</div>

<script>
let ctr=Date.now();
function uid(){return 'x'+(++ctr);}

const DEF = {
  sections:[
    {id:'s1',icon:'🏠',title:'Logement & Énergie',cl:'pu',rows:[]},
    {id:'s7',icon:'💸',title:'Impôts & Taxes',cl:'re',rows:[]},
    {id:'s2',icon:'💳',title:'Crédits',cl:'re',rows:[]},
    {id:'s3',icon:'🔒',title:'Assurances',cl:'or',rows:[]},
    {id:'s4',icon:'📱',title:'Télécom',cl:'cy',rows:[]},
    {id:'s5',icon:'📺',title:'Loisirs & Subs',cl:'pi',rows:[]},
    {id:'s6',icon:'🛒',title:'Consommation',cl:'gr',rows:[]}
  ],
  annual:[],
  lastM: new Date().getMonth()
};

let ST = JSON.parse(localStorage.getItem('bdg_pwa')) || DEF;

function save(){ localStorage.setItem('bdg_pwa',JSON.stringify(ST)); const s=document.getElementById('sv'); s.classList.add('show'); setTimeout(()=>s.classList.remove('show'),2000); }
function fmt(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:2})+' €'; }

function checkLogic() {
    const now = new Date(); const m = now.getMonth(); const d = now.getDate();
    ST.sections.forEach(sec => {
        sec.rows.forEach(r => {
            if (r.isP) {
                if (ST.lastM !== m) r.pd = false;
                if (d >= r.py && !r.pd) { r.ml -= 1; r.pd = true; }
            }
        });
        sec.rows = sec.rows.filter(r => !r.isP || r.ml > 0);
    });
    ST.lastM = m; save();
}

function render(){
  checkLogic();
  const c=document.getElementById('sc'); c.innerHTML='';
  let tM=0; let tD=0;

  ST.sections.forEach(sec=>{
    let sT=0;
    const rows = sec.rows.map((r, idx) => {
        const isPaid = r.isP && r.pd;
        if(!isPaid) { sT += r.a; tM += r.a; }
        if(r.isP) tD += (r.a * r.ml);
        return `<tr style="${isPaid?'opacity:0.4':''}">
            <td><span class="ed">${r.e||''} ${r.n}</span>
            ${r.isP?`<span class="rem-info">Reste <span class="rem-total">${fmt(r.a*r.ml)}</span> (${r.ml}m)</span>`:''}</td>
            <td class="ta">${fmt(r.a)}</td>
            <td class="tac"><button class="bd" onclick="dR('${sec.id}',${idx})">🗑</button></td></tr>`;
    }).join('');

    const div=document.createElement('div'); div.className='sec';
    div.innerHTML=`<div class="sh"><h2>${sec.icon} ${sec.title} <span class="bk ${sec.cl}">${fmt(sT)}</span></h2></div>
    <div class="cb"><table><tbody>${rows}</tbody></table>
    <div class="ap"><button class="ba" onclick="oM('${sec.id}')">➕ Ajouter une facture</button></div></div>`;
    c.appendChild(div);
  });

  document.getElementById('ct').textContent=fmt(tM);
  document.getElementById('ch').textContent=fmt(tM/2);
  document.getElementById('ca').textContent=fmt(tD);
}

let curS = null;
function oM(sid){ curS=sid; document.getElementById('modal').style.display='flex'; }
function cM(){ document.getElementById('modal').style.display='none'; }
function dR(sid,idx){ if(confirm('Supprimer ?')){ ST.sections.find(s=>s.id===sid).rows.splice(idx,1); save(); render(); }}

function confAdd(){
  const n=document.getElementById('nn').value, a=parseFloat(document.getElementById('na').value), e=document.getElementById('ne').value;
  const p=document.getElementById('is-plan').checked;
  if(n&&a){
    ST.sections.find(s=>s.id===curS).rows.push({
      n, a, e, isP:p, ml:p?parseInt(document.getElementById('n-months').value):0, py:p?parseInt(document.getElementById('pay-day').value):22, pd:false
    });
    save(); render(); cM();
  }
}

function showExport(){ alert("Code de sauvegarde :\n\n" + btoa(JSON.stringify(ST))); }
function showImport(){ let c=prompt("Colle ton code ici :"); if(c){ ST=JSON.parse(atob(c)); save(); render(); }}

render();
</script>
</body>
</html>
