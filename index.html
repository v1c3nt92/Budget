<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>📱 MySuperApp - Budget & Compteurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1c1c24;
            --accent: #6366f1;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 20px;
            padding-bottom: 100px;
        }

        h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; margin-bottom: 20px; text-align: center; color: var(--accent); }
        h2 { font-size: 1.1rem; margin: 20px 0 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2e2e3a;
        }

        .info { display: flex; flex-direction: column; }
        .label { font-weight: 600; font-size: 1rem; }
        .sub { font-size: 0.8rem; color: var(--text-dim); }

        input {
            background: #2e2e3a;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 100px;
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        /* Barre d'outils de sauvegarde en bas */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(28, 28, 36, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #2e2e3a;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-save { background: var(--accent); color: white; }
        .btn-load { background: #334155; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 90%;
            z-index: 100;
            border: 1px solid var(--accent);
        }

        textarea { width: 100%; height: 150px; background: #0f0f13; color: var(--success); border-radius: 10px; padding: 10px; font-family: monospace; font-size: 10px; margin-top: 10px; border: 1px solid #2e2e3a; }
    </style>
</head>
<body>

    <h1>📱 Mon Manager</h1>

    <h2>🏗️ Relevé Compteurs</h2>
    <div class="card">
        <div class="info">
            <span class="label">Bâtiment A - Eau</span>
            <span class="sub">Dernier : <span id="last-eau">1450</span> m³</span>
        </div>
        <input type="number" id="compteur-eau" placeholder="0" oninput="saveData()">
    </div>

    <div class="card">
        <div class="info">
            <span class="label">Bâtiment A - Élec</span>
            <span class="sub">Dernier : <span id="last-elec">8920</span> kWh</span>
        </div>
        <input type="number" id="compteur-elec" placeholder="0" oninput="saveData()">
    </div>

    <h2>💰 Budget Mensuel</h2>
    <div class="card">
        <div class="info"><span class="label">🏠 Loyer / Crédit</span></div>
        <input type="number" id="budget-loyer" placeholder="0" oninput="saveData()">
    </div>
    <div class="card">
        <div class="info"><span class="label">🏛️ Impôts</span></div>
        <input type="number" id="budget-impots" placeholder="0" oninput="saveData()">
    </div>

    <div class="toolbar">
        <button class="btn btn-save" onclick="exportData()">💾 SAUVER<br><span style="font-size: 7px;">(EXPORT)</span></button>
        <button class="btn btn-load" onclick="showImport()">📥 CHARGER<br><span style="font-size: 7px;">(IMPORT)</span></button>
    </div>

    <div id="modal" class="modal">
        <p id="modal-title" style="font-weight: bold;"></p>
        <textarea id="data-box"></textarea>
        <button onclick="closeModal()" style="margin-top:15px; width:100%; padding:10px; border-radius:10px; background:var(--accent); color:white; border:none;">Fermer</button>
    </div>

    <script>
        const inputs = ['compteur-eau', 'compteur-elec', 'budget-loyer', 'budget-impots'];

        function saveData() {
            inputs.forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value);
            });
        }

        function loadData() {
            inputs.forEach(id => {
                if(localStorage.getItem(id)) {
                    document.getElementById(id).value = localStorage.getItem(id);
                }
            });
        }

        function exportData() {
            let data = {};
            inputs.forEach(id => data[id] = document.getElementById(id).value);
            document.getElementById('modal-title').innerText = "Copie ce code dans tes Notes :";
            document.getElementById('data-box').value = JSON.stringify(data);
            document.getElementById('modal').style.display = 'block';
        }

        function showImport() {
            document.getElementById('modal-title').innerText = "Colle ton code ici :";
            document.getElementById('data-box').value = "";
            document.getElementById('data-box').placeholder = "Colle le code JSON ici...";
            document.getElementById('modal').style.display = 'block';
            
            // On ajoute un bouton temporaire pour valider l'import
            let btn = document.createElement("button");
            btn.innerText = "VALIDER L'IMPORT";
            btn.style = "width:100%; background:var(--success); color:white; border:none; padding:10px; border-radius:10px; margin-top:10px;";
            btn.onclick = function() {
                try {
                    let imported = JSON.parse(document.getElementById('data-box').value);
                    for (let key in imported) {
                        if(document.getElementById(key)) {
                            document.getElementById(key).value = imported[key];
                        }
                    }
                    saveData();
                    alert("Données restaurées !");
                    closeModal();
                } catch(e) { alert("Code invalide !"); }
            };
            document.getElementById('modal').appendChild(btn);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onload = loadData;
    </script>
</body>
</html>
