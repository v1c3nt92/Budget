<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰 Mon Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:15px 15px 100px;}
h1,h2{font-family:'Syne',sans-serif;}

/* Header sans chevauchement */
.hdr{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:25px;}
.hdr-txt h1{font-size:2.2rem; font-weight:800; background:linear-gradient(135deg,#6c63ff,#ff6584); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
.hdr-txt p{color:var(--m); font-size:.75rem; margin-top:4px;}
.hdr-btns{display:flex; gap:10px;}
.btn-top{background:var(--s); border:1px solid var(--b); color:var(--t); width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.2rem;}

/* Cartes Stats */
.grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;}
.card{background:var(--s); border:1px solid var(--b); border-radius:14px; padding:15px; border-top:3px solid var(--a);}
.card.pi{border-top-color:#ff6584;} .card.gr{border-top-color:#43e97b;} .card.or{border-top-color:#ff9f43;}
.label{font-size:.65rem; color:var(--m); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; font-weight:600;}
.val{font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700;}

/* Sections */
.sec{background:var(--s); border:1px solid var(--b); border-radius:16px; margin-bottom:12px; overflow:hidden;}
.sh{padding:14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; border-bottom:1px solid var(--b);}
.sh h2{font-size:.9rem; display:flex; align-items:center; gap:8px;}
.amt-tag{font-size:.7rem; padding:3px 9px; border-radius:20px; background:rgba(108,99,255,0.1); color:var(--a); font-weight:700;}

table{width:100%; border-collapse:collapse;}
td{padding:12px 14px; font-size:.85rem; border-bottom:1px solid var(--b);}
.price{text-align:right; font-family:'Syne',sans-serif; font-weight:600;}
.del-btn{background:none; border:none; color:var(--m); cursor:pointer; padding:5px; font-size:1rem;}
.add-btn{width:calc(100% - 28px); margin:12px 14px; padding:12px; background:rgba(108,99,255,0.05); border:1px dashed var(--a); color:var(--a); border-radius:10px; font-size:.8rem; cursor:pointer;}

/* Barre de sauvegarde fixe */
.dock{position:fixed; bottom:0; left:0; right:0; background:var(--s); padding:15px; border-top:1px solid var(--b); display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.btn-dock{padding:14px; border-radius:12px; border:none; font-family:'Syne',sans-serif; font-weight:700; font-size:.8rem; cursor:pointer;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-txt">
    <h1>Mon Budget</h1>
    <p>Appuie sur un montant pour modifier</p>
  </div>
  <div class="hdr-btns">
    <button class="btn-top" onclick="exportData()">💾</button>
    <button class="btn-top" onclick="importData()">📥</button>
  </div>
</div>

<div class="grid">
  <div class="card"><div class="label">Total mensuel</div><div class="val" id="t-m">-</div></div>
  <div class="card pi"><div class="label">Par quinzaine</div><div class="val" id="t-q">-</div></div>
  <div class="card gr"><div class="label">Total annuel</div><div class="val" id="t-a">-</div></div>
  <div class="card or"><div class="label">Charges fixes</div><div class="val" id="t-f">-</div></div>
</div>

<div id="content"></div>

<div class="dock">
  <button class="btn-dock" style="background:var(--a); color:#fff;" onclick="exportData()">COPIER CODE</button>
  <button class="btn-dock" style="background:var(--s2); color:var(--m); border:1px solid var(--b);" onclick="importData()">IMPORTER DATA</button>
</div>

<script>
// Données exactes réinjectées
let data = {
  mensuel: [
    { cat: "🏠 Logement & Énergie", items: [
      { n: "Crédit maison", v: 552.80 }, { n: "Electricité / gaz", v: 120.00 }, { n: "Eau", v: 35.78 }, { n: "Internet", v: 70.00 }, { n: "Energy", v: 0.99 }
    ]},
    { cat: "💳 Crédits", items: [{ n: "Buy Way", v: 124.00 }] },
    { cat: "🛡 Assurances", items: [
      { n: "Assurance incendie", v: 52.54 }, { n: "Mutuelle", v: 13.50 }, { n: "CSC", v: 21.90 }, { n: "Dela", v: 10.97 }, { n: "AXA", v: 39.25 }, { n: "Verisure", v: 53.99 }
    ]},
    { cat: "📱 Télécom", items: [{ n: "Téléphone", v: 114.99 }] },
    { cat: "📺 Loisirs", items: [
      { n: "Tv", v: 30.00 }, { n: "Amazon", v: 9.98 }, { n: "Netflix", v: 14.99 }, { n: "Apple music", v: 10.99 }, { n: "Disney +", v: 15.99 }, { n: "iCloud", v: 2.99 }, { n: "Ps5", v: 13.99 }
    ]},
    { cat: "🛒 Consommation", items: [{ n: "Course", v: 120.00 }] }
  ],
  annuel: [
    { n: "Cadastre", v: 604, m: "Octobre" }, { n: "Assurance vie", v: 142.89, m: "Janvier" }, { n: "Taxe poubelle", v: 220, m: "Avril" }, { n: "Taxe égout", v: 20, m: "Juillet" }
  ]
};

function format(v) { return v.toLocaleString('fr-FR', {minimumFractionDigits: 2}) + ' €'; }

function render() {
  const container = document.getElementById('content');
  container.innerHTML = '';
  let totalM = 0;

  data.mensuel.forEach((s, sIdx) => {
    let sTot = s.items.reduce((acc, curr) => acc + curr.v, 0);
    totalM += sTot;
    let html = `<div class="sec"><div class="sh"><h2>${s.cat}</h2><span class="amt-tag">${format(sTot)}</span></div><table>`;
    s.items.forEach((item, iIdx) => {
      html += `<tr><td onclick="editN(${sIdx},${iIdx})">${item.n}</td><td class="price" onclick="editV(${sIdx},${iIdx})">${format(item.v)}</td><td style="width:40px; text-align:right;"><button class="del-btn" onclick="del(${sIdx},${iIdx})">×</button></td></tr>`;
    });
    html += `</table><button class="add-btn" onclick="add(${sIdx})">+ Ajouter</button></div>`;
    container.innerHTML += html;
  });

  // Section Annuelle
  let totalA = data.annuel.reduce((acc, curr) => acc + curr.v, 0);
  let aHtml = `<div class="sec" style="border-color:var(--m)"><div class="sh"><h2>📅 Annuel</h2><span class="amt-tag" style="color:var(--m)">${format(totalA)}/an</span></div><table>`;
  data.annuel.forEach((a, idx) => {
    aHtml += `<tr><td>${a.n} (${a.m})</td><td class="price">${format(a.v)}</td><td></td></tr>`;
  });
  container.innerHTML += aHtml + `</table></div>`;

  document.getElementById('t-m').innerText = format(totalM);
  document.getElementById('t-q').innerText = format(totalM / 2);
  document.getElementById('t-a').innerText = format(totalM * 12);
  document.getElementById('t-f').innerText = format(totalA);
}

function editV(s, i) { 
  let n = prompt("Montant ?", data.mensuel[s].items[i].v);
  if(n) { data.mensuel[s].items[i].v = parseFloat(n); render(); }
}
function editN(s, i) { 
  let n = prompt("Nom ?", data.mensuel[s].items[i].n);
  if(n) { data.mensuel[s].items[i].n = n; render(); }
}
function del(s, i) { if(confirm("Supprimer ?")) { data.mensuel[s].items.splice(i, 1); render(); } }
function add(s) { 
  let n = prompt("Nom ?"); let v = prompt("Montant ?");
  if(n && v) { data.mensuel[s].items.push({n, v: parseFloat(v)}); render(); }
}

function exportData() {
  const code = JSON.stringify(data);
  navigator.clipboard.writeText(code);
  alert("Données copiées ! Garde ce texte précieusement.");
}

function importData() {
  const code = prompt("Colle ton code de sauvegarde ici :");
  if(code) { data = JSON.parse(code); render(); }
}

render();
</script>
</body>
</html>
