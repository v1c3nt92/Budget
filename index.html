<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>💰 Budget Pro Officiel</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:18px 13px 40px;}
h1,h2{font-family:'Syne',sans-serif;}

.hdr{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--b); padding-bottom:10px;}
.hdr-titles h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-tools{display:flex; gap:10px;}
.btn-icon{background:var(--s); border:1px solid var(--b); color:var(--t); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.2rem;}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.card.pu::before{background:#6c63ff;}
.card.pi::before{background:#ff6584;}
.card.gr::before{background:#43e97b;}
.card.or::before{background:#ff9f43;}
.cl{font-size:.64rem;color:var(--m);text-transform:uppercase;margin-bottom:3px;}
.cv{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;}

#save-area{display:none; background:#fff; color:#000; padding:15px; border-radius:12px; margin-bottom:20px;}
.fi{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);border-radius:10px;padding:12px;margin-bottom:12px;outline:none;}

.sec{background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden;margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);}
.sh h2{font-size:.88rem;}
.bk{font-size:.67rem;padding:2px 8px;border-radius:20px;background:rgba(108,99,255,.18);color:#6c63ff;}

table{width:100%;border-collapse:collapse;}
td{padding:12px 14px;font-size:.85rem;border-bottom:1px solid var(--b);}
.ta{text-align:right;font-weight:600;}
.bd{background:none;border:none;color:var(--m);cursor:pointer;}

.ba{background:rgba(108,99,255,0.1);border:1px dashed var(--a);color:var(--a);border-radius:10px;padding:12px;width:calc(100% - 28px);margin:10px 14px;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;}
.mb{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:25px;width:100%;max-width:350px;}
</style>
</head>

<body>

<div class="hdr">
  <div class="hdr-titles"><h1>Mon Budget</h1></div>
  <div class="hdr-tools">
    <button class="btn-icon" onclick="exportData()">💾</button>
    <button class="btn-icon" onclick="importData()">📥</button>
  </div>
</div>

<!-- IMPORT FILE HIDDEN -->
<input type="file" id="file-import" accept="application/json" style="display:none" onchange="handleImportFile(event)">

<div id="save-area">
  <b>Sauvegarde générée</b>
</div>

<div id="sc"></div>

<div class="mo" id="modal">
  <div class="mb">
    <h3>Ajouter</h3>
    <input id="nn" class="fi" placeholder="Nom">
    <input id="na" class="fi" type="number" placeholder="Montant">
    <button onclick="saveItem()" class="fi" style="background:var(--a);color:white">Valider</button>
    <button onclick="closeModal()" class="fi">Annuler</button>
  </div>
</div>

<script>
const INITIAL = {
  sections: [
    {id:'s1', icon:'🏠', title:'Logement', rows:[
      {n:'Crédit maison', a:552.80, e:'🏠'},
      {n:'Électricité', a:145.69, e:'⚡'}
    ]},
    {id:'s2', icon:'💳', title:'Crédits', rows:[
      {n:'Buy Way', a:124.00, e:'💳'}
    ]}
  ]
};

let ST = JSON.parse(localStorage.getItem('budget_pro_v7')) || INITIAL;
let curSid = null;

function fmt(n){return n.toLocaleString('fr-FR',{minimumFractionDigits:2})+' €';}

function render(){
  const c = document.getElementById('sc');
  c.innerHTML = '';

  ST.sections.forEach(sec=>{
    const div=document.createElement('div');
    div.className='sec';

    div.innerHTML=`
      <div class="sh">
        <h2>${sec.icon} ${sec.title}</h2>
      </div>
      <table>
        ${sec.rows.map((r,i)=>`
          <tr>
            <td>${r.e} ${r.n}</td>
            <td class="ta">${fmt(r.a)}</td>
          </tr>
        `).join('')}
      </table>
    `;
    c.appendChild(div);
  });

  localStorage.setItem('budget_pro_v7',JSON.stringify(ST));
}

function exportData(){
  const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='budget_sauvegarde.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(){
  document.getElementById('file-import').click();
}

function handleImportFile(e){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=function(ev){
    try{
      ST=JSON.parse(ev.target.result);
      render();
      alert('Sauvegarde importée ✔');
    }catch(err){
      alert('Fichier invalide');
    }
  };

  reader.readAsText(file);
}

function saveItem(){
  const n=document.getElementById('nn').value;
  const a=parseFloat(document.getElementById('na').value);
  if(!n||!a)return;

  ST.sections[0].rows.push({n,a,e:'💸'});
  render();
  closeModal();
}

function closeModal(){document.getElementById('modal').style.display='none';}

render();
</script>

</body>
</html>
