<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f13">
<title>💰 Budget Pro Dynamique</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:18px 13px 100px;}
h1,h2{font-family:'Syne',sans-serif;}

/* HEADER AVEC TES DISQUETTES */
.hdr{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:0 5px;}
.hdr-titles h1{font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-titles p{color:var(--m);font-size:.75rem;margin-top:2px;}
.hdr-tools{display:flex; gap:10px;}
.btn-icon{background:var(--s); border:1px solid var(--b); color:var(--t); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.2rem; transition:0.2s;}
.btn-icon:active{transform:scale(0.9); background:var(--b);}

.saved{font-size:.7rem;color:#43e97b;text-align:center;margin-bottom:15px;opacity:0;transition:opacity .4s;display:block;}
.saved.show{opacity:1;}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.card.pu::before{background:#6c63ff;}.card.pi::before{background:#ff6584;}
.card.gr::before{background:#43e97b;}.card.or::before{background:#ff9f43;}
.cl{font-size:.64rem;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.cv{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;}

.sec{background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden;margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);cursor:pointer;}
.sh h2{font-size:.88rem;font-weight:700;}
.bk{font-size:.67rem;padding:2px 8px;border-radius:20px;font-weight:500;}
.bk.pu{background:rgba(108,99,255,.18);color:#6c63ff;}
.bk.gr{background:rgba(67,233,123,.18);color:#43e97b;}

table{width:100%;border-collapse:collapse;}
td{padding:12px 14px;font-size:.83rem;border-bottom:1px solid var(--b);}
.ta{text-align:right;font-family:'Syne',sans-serif;font-weight:600;}
.rem-info{font-size:0.62rem;color:var(--m);display:block;margin-top:2px;}
.rem-total{color:#43e97b;font-weight:700;}

.ba{background:rgba(108,99,255,.1);border:1px dashed rgba(108,99,255,.35);color:#6c63ff;border-radius:10px;padding:12px;font-size:.8rem;cursor:pointer;width:100%;margin:10px 0;}
.ap{padding:0 14px;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(4px);}
.mb{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:25px;width:100%;max-width:350px;}
.fi{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);border-radius:10px;padding:12px;margin-bottom:12px;outline:none;}
.modal-save { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 110; display: none; align-items: center; justify-content: center; padding: 20px; }
.data-box { width:100%; height:180px; background:#000; color:#43e97b; font-family:monospace; font-size:0.7rem; border-radius:12px; padding:12px; border:1px solid var(--b); margin:15px 0; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-titles">
    <h1>💰 Budget Pro</h1>
    <p>Impôts & Factures</p>
  </div>
  <div class="hdr-tools">
    <button class="btn-icon" onclick="showExport()">💾</button>
    <button class="btn-icon" onclick="showImport()">📥</button>
  </div>
</div>

<span class="saved" id="sv">✅ Données sauvegardées</span>

<div class="cards">
  <div class="card pu"><div class="cl">Total ce mois</div><div class="cv" id="ct">0.00 €</div></div>
  <div class="card gr"><div class="cl">Dettes restantes</div><div class="cv" id="cr">0.00 €</div></div>
</div>

<div id="sc"></div>

<div class="ap">
    <button class="ba" onclick="oM()">➕ Ajouter un élément</button>
</div>

<div class="mo" id="modal" style="display:none">
  <div class="mb">
    <h3 style="margin-bottom:15px; font-family:Syne;">Nouveau Paiement</h3>
    <input class="fi" id="nn" placeholder="Nom (ex: Impôts fonciers)">
    <input class="fi" id="na" type="number" placeholder="Montant mensuel €">
    
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
      <input type="checkbox" id="is-plan" onchange="document.getElementById('plan-fields').style.display = this.checked ? 'block' : 'none'">
      <span style="font-size:0.85rem">📅 Échéancier (Dette/Impôt)</span>
    </div>

    <div id="plan-fields" style="display:none; border-left:2px solid var(--a); padding-left:12px; margin-bottom:15px;">
      <input class="fi" id="n-months" type="number" placeholder="Mois restants" value="12">
      <input class="fi" id="pay-day" type="number" placeholder="Jour prélèvement" value="22">
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="fi" style="background:var(--s2); border:none; color:var(--m)" onclick="cM()">Annuler</button>
      <button class="fi" style="background:var(--a); border:none; color:white; font-weight:bold;" onclick="confAdd()">Valider ✓</button>
    </div>
  </div>
</div>

<div class="modal-save" id="modal-save">
  <div class="mb">
    <h3 id="ms-title" style="font-family:Syne;">Sauvegarde</h3>
    <textarea class="data-box" id="ms-box" spellcheck="false" onclick="this.select()"></textarea>
    <div id="import-zone" style="display:none">
        <button class="fi" style="background:#43e97b; color:black; font-weight:bold; border:none" id="btn-confirm-import">CONFIRMER L'IMPORT</button>
    </div>
    <button class="fi" style="background:var(--s2); border:none; color:var(--t)" onclick="closeMS()">Fermer</button>
  </div>
</div>

<script>
// On utilise bdg_v4 pour ne pas mélanger avec tes anciens tests
let ST = JSON.parse(localStorage.getItem('bdg_v4')) || { items: [], lastM: new Date().getMonth() };

function save() { 
  localStorage.setItem('bdg_v4', JSON.stringify(ST)); 
  const s = document.getElementById('sv');
  s.classList.add('show');
  setTimeout(() => s.classList.remove('show'), 2000);
}

function fmt(n) { return n.toLocaleString('fr-FR', {minimumFractionDigits:2}) + ' €'; }

function checkLogic() {
  const now = new Date();
  const m = now.getMonth();
  const d = now.getDate();
  ST.items.forEach(item => {
    if (item.isPlan) {
      if (ST.lastM !== m) item.paidM = false;
      if (d >= item.payDay && !item.paidM) {
        item.monthsLeft -= 1;
        item.paidM = true;
      }
    }
  });
  ST.items = ST.items.filter(item => !item.isPlan || item.monthsLeft > 0);
  ST.lastM = m;
  save();
}

function render() {
  checkLogic();
  const container = document.getElementById('sc');
  container.innerHTML = '';
  let totalM = 0; let totalD = 0;

  const div = document.createElement('div');
  div.className = 'sec';
  let rows = "";

  ST.items.forEach((item, idx) => {
    const isPaid = item.isPlan && item.paidM;
    if (!isPaid) totalM += item.amount;
    if (item.isPlan) totalD += (item.amount * item.monthsLeft);

    rows += `<tr style="${isPaid ? 'opacity:0.4' : ''}">
      <td>
        <span style="font-weight:700">${item.name} ${isPaid ? '✅' : ''}</span>
        ${item.isPlan ? `<span class="rem-info">Reste <span class="rem-total">${fmt(item.amount * item.monthsLeft)}</span> (${item.monthsLeft} mois)</span>` : ''}
      </td>
      <td class="ta">${fmt(item.amount)}</td>
      <td style="text-align:right"><button onclick="del(${idx})" style="background:none;border:none;color:var(--m);cursor:pointer">🗑</button></td>
    </tr>`;
  });

  div.innerHTML = `<div class="sh"><h2>📊 Factures & Impôts <span class="bk pu">${fmt(totalM)}</span></h2></div>
  <table>${rows}</table>`;
  container.appendChild(div);

  document.getElementById('ct').innerText = fmt(totalM);
  document.getElementById('cr').innerText = fmt(totalD);
}

function oM() { document.getElementById('modal').style.display = 'flex'; }
function cM() { document.getElementById('modal').style.display = 'none'; }

function confAdd() {
  const n = document.getElementById('nn').value;
  const a = parseFloat(document.getElementById('na').value);
  const p = document.getElementById('is-plan').checked;
  if (n && a) {
    ST.items.push({
      name: n, amount: a, isPlan: p,
      monthsLeft: p ? parseInt(document.getElementById('n-months').value) : null,
      payDay: p ? parseInt(document.getElementById('pay-day').value) : 22,
      paidM: false
    });
    save(); render(); cM();
  }
}

function del(i) { if(confirm('Supprimer ?')) { ST.items.splice(i, 1); save(); render(); } }

function showExport() {
  document.getElementById('ms-title').innerText = "Exporter";
  document.getElementById('ms-box').value = btoa(JSON.stringify(ST));
  document.getElementById('import-zone').style.display = 'none';
  document.getElementById('modal-save').style.display = 'flex';
}

function showImport() {
  document.getElementById('ms-title').innerText = "Importer";
  document.getElementById('ms-box').value = "";
  document.getElementById('import-zone').style.display = 'block';
  document.getElementById('modal-save').style.display = 'flex';
  document.getElementById('btn-confirm-import').onclick = function() {
    try {
      const data = JSON.parse(atob(document.getElementById('ms-box').value));
      ST = data; save(); render(); closeMS();
    } catch(e) { alert("Code erroné"); }
  };
}

function closeMS() { document.getElementById('modal-save').style.display = 'none'; }

render();
</script>
</body>
</html>
