<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>💰 Budget Pro Officiel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:18px 13px 40px;}
h1,h2{font-family:'Syne',sans-serif;}

.hdr{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--b); padding-bottom:10px;}
.hdr-titles h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-tools{display:flex; gap:10px;}
.btn-icon{background:var(--s); border:1px solid var(--b); color:var(--t); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer;}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.card.pu::before{background:#6c63ff;}.card.pi::before{background:#ff6584;}
.card.gr::before{background:#43e97b;}.card.or::before{background:#ff9f43;}
.cl{font-size:.64rem;color:var(--m);text-transform:uppercase;margin-bottom:3px;}
.cv{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;}

.sec{background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden;margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);background:rgba(255,255,255,0.02);}
.sh h2{font-size:.88rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.bk{font-size:.67rem;padding:2px 8px;border-radius:20px;font-weight:700;background:rgba(108,99,255,.18);color:#6c63ff;}

table{width:100%;border-collapse:collapse;}
td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid var(--b); cursor:pointer;}
.ta{text-align:right;font-family:'Syne',sans-serif;font-weight:600;}
.bd{background:none;border:none;color:var(--m);cursor:pointer;font-size:0.9rem;}
.ba{background:rgba(108,99,255,.05);border:1px dashed var(--a);color:var(--a);border-radius:10px;padding:12px;font-size:.8rem;cursor:pointer;width:calc(100% - 28px);margin:10px 14px;}

.rem-info{font-size:0.6rem;color:var(--m);display:block;margin-bottom:2px;}
.rem-total{color:#43e97b;font-weight:700;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(5px);}
.mb{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:25px;width:100%;max-width:350px;}
.fi{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);border-radius:10px;padding:12px;margin-bottom:12px;outline:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-titles"><h1>Mon Budget</h1></div>
  <div class="hdr-tools">
    <button class="btn-icon" onclick="copyCode()">💾</button>
    <button class="btn-icon" onclick="showImport()">📥</button>
  </div>
</div>

<div class="cards">
  <div class="card pu"><div class="cl">Total mensuel</div><div class="cv" id="ct">0.00 €</div></div>
  <div class="card pi"><div class="cl">Par quinzaine</div><div class="cv" id="ch">0.00 €</div></div>
  <div class="card gr"><div class="cl">Total Annuel</div><div class="cv" id="ca">0.00 €</div></div>
  <div class="card or"><div class="cl">Charges Annuelles</div><div class="cv" id="cy">0.00 €</div></div>
</div>

<div id="sc"></div>

<div class="ap" style="margin-top:20px;">
    <button class="ba" style="background:rgba(67,233,123,0.1); border-color:#43e97b; color:#43e97b;" onclick="addCategory()">📁 Nouvelle catégorie</button>
</div>

<div class="mo" id="modal">
  <div class="mb">
    <h3 id="modal-title" style="margin-bottom:15px; font-family:Syne;">➕ Ajouter</h3>
    <input class="fi" id="nn" placeholder="Nom de la facture">
    <input class="fi" id="na" type="number" step="0.01" placeholder="Montant €">
    <input class="fi" id="ne" placeholder="Emoji (🏠, 💳...)">
    
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
      <input type="checkbox" id="is-plan" onchange="document.getElementById('plan-fields').style.display = this.checked ? 'block' : 'none'">
      <span style="font-size:0.85rem">📅 Échéancier (Impôts...)</span>
    </div>

    <div id="plan-fields" style="display:none; border-left:2px solid var(--a); padding-left:12px; margin-bottom:15px;">
      <input class="fi" id="n-months" type="number" placeholder="Mois restants">
      <input class="fi" id="pay-day" type="number" placeholder="Jour prélèvement (ex: 22)">
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="fi" style="background:var(--s2); border:none; color:var(--m)" onclick="closeModal()">Annuler</button>
      <button class="fi" style="background:var(--a); border:none; color:white; font-weight:bold;" onclick="saveItem()">Valider ✓</button>
    </div>
  </div>
</div>

<script>
const INITIAL = {
  sections: [
    {id:'s1', icon:'🏠', title:'Logement & Énergie', rows:[
        {n:'Crédit maison', a:552.80, e:'🏠'},
        {n:'Électricité / Gaz', a:120.00, e:'⚡'},
        {n:'Eau', a:35.78, e:'💦'},
        {n:'Internet', a:70.00, e:'🛜'},
        {n:'Energy', a:0.99, e:'⚡'}
    ]},
    {id:'s2', icon:'💳', title:'Crédits & Assurances', rows:[
        {n:'Buy Way', a:124.00, e:'💳'},
        {n:'Assurance incendie', a:52.54, e:'🔥'},
        {n:'Mutuelle', a:13.50, e:'🏥'},
        {n:'CSC', a:21.90, e:'🤝'},
        {n:'Dela', a:10.97, e:'💀'},
        {n:'AXA', a:39.25, e:'🛡️'},
        {n:'Verisure', a:53.99, e:'🚨'}
    ]},
    {id:'s3', icon:'📱', title:'Télécom & Loisirs', rows:[
        {n:'Téléphone', a:114.99, e:'📱'},
        {n:'Tv', a:30.00, e:'📺'},
        {n:'Amazon', a:9.98, e:'📦'},
        {n:'Netflix', a:14.99, e:'🎬'},
        {n:'Apple music', a:10.99, e:'🎵'},
        {n:'Disney +', a:15.99, e:'🏰'},
        {n:'iCloud', a:2.99, e:'🤖'},
        {n:'Ps5', a:13.99, e:'🎮'}
    ]},
    {id:'s4', icon:'🛒', title:'Consommation', rows:[
        {n:'Course', a:120.00, e:'🛒'}
    ]},
    {id:'s5', icon:'📅', title:'Taxes Annuelles', rows:[
        {n:'Cadastre (Oct)', a:604.00, e:'🏛️', isA:true},
        {n:'Assurance vie (Jan)', a:142.89, e:'🧬', isA:true},
        {n:'Taxe poubelle (Avr)', a:220.00, e:'🗑️', isA:true},
        {n:'Taxe égout (Juil)', a:20.00, e:'🌊', isA:true}
    ]}
  ],
  lastCheck: new Date().getMonth()
};

let ST = JSON.parse(localStorage.getItem('bdg_pwa_v4')) || INITIAL;
let curSid = null;

function fmt(n) { return n.toLocaleString('fr-FR', {minimumFractionDigits:2}) + ' €'; }

function logic() {
  const now = new Date();
  const m = now.getMonth();
  const d = now.getDate();
  
  ST.sections.forEach(sec => {
    sec.rows = sec.rows.filter(r => {
      if (r.isP) {
        if (ST.lastCheck !== m && d >= r.pd) {
            r.ml -= 1;
        }
        return r.ml > 0;
      }
      return true;
    });
  });
  ST.lastCheck = m;
}

function render() {
  logic();
  const container = document.getElementById('sc');
  container.innerHTML = '';
  let tM = 0; let tA = 0;

  ST.sections.forEach(sec => {
    let sT = 0;
    let rowsHtml = sec.rows.map((r, idx) => {
      if(!r.isA) { sT += r.a; tM += r.a; } else { tA += r.a; }
      return `<tr>
        <td onclick="editItem('${sec.id}', ${idx})">
          ${r.isP ? `<span class="rem-info">Reste <span class="rem-total">${fmt(r.a * r.ml)}</span> (${r.ml} mois)</span>` : ''}
          <span style="font-weight:700">${r.e || ''} ${r.n}</span>
        </td>
        <td class="ta" onclick="editItem('${sec.id}', ${idx})">${fmt(r.a)}</td>
        <td style="text-align:right"><button class="bd" onclick="del('${sec.id}', ${idx})">🗑</button></td>
      </tr>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'sec';
    div.innerHTML = `
      <div class="sh"><h2>${sec.icon} ${sec.title} <span class="bk">${sec.id === 's5' ? fmt(tA) : fmt(sT)}</span></h2></div>
      <table><tbody>${rowsHtml}</tbody></table>
      <div class="ap"><button class="ba" onclick="openModal('${sec.id}')">➕ Ajouter une ligne</button></div>
    `;
    container.appendChild(div);
  });

  document.getElementById('ct').innerText = fmt(tM);
  document.getElementById('ch').innerText = fmt(tM/2);
  document.getElementById('ca').innerText = fmt(tM * 12);
  document.getElementById('cy').innerText = fmt(tA);
  localStorage.setItem('bdg_pwa_v4', JSON.stringify(ST));
}

function openModal(sid) { curSid = sid; document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveItem() {
  const n = document.getElementById('nn').value;
  const a = parseFloat(document.getElementById('na').value);
  const p = document.getElementById('is-plan').checked;
  if(n && a) {
    ST.sections.find(s => s.id === curSid).rows.push({
      n, a, e: document.getElementById('ne').value || '💸',
      isP: p, ml: p ? parseInt(document.getElementById('n-months').value) : 0,
      pd: p ? parseInt(document.getElementById('pay-day').value) : 0
    });
    render(); closeModal();
  }
}

function editItem(sid, idx) {
  const r = ST.sections.find(s => s.id === sid).rows[idx];
  const newN = prompt("Nom :", r.n);
  const newA = prompt("Montant :", r.a);
  if(newN) r.n = newN;
  if(newA) r.a = parseFloat(newA);
  render();
}

function addCategory() {
    const t = prompt("Nom de la catégorie ?");
    if(t) { ST.sections.push({id: 's'+Date.now(), icon: '📁', title: t, rows: []}); render(); }
}

function del(sid, i) { if(confirm('Supprimer ?')) { ST.sections.find(s => s.id === sid).rows.splice(i, 1); render(); } }

async function copyCode() {
  const code = btoa(JSON.stringify(ST));
  try {
    await navigator.clipboard.writeText(code);
    alert("Code copié dans le presse-papier ! Garde-le précieusement.");
  } catch (err) {
    prompt("Copie manuellement ce code :", code);
  }
}

function showImport() { 
  let c = prompt("Colle ton code de sauvegarde ici :"); 
  if(c) { try { ST = JSON.parse(atob(c)); render(); } catch(e) { alert("Erreur de code !"); } } 
}

render();
</script>
</body>
</html>
