<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>💰 Mon Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:20px 13px 100px;}
h1,h2{font-family:'Syne',sans-serif;}

/* Header rectifié : Titre à gauche, boutons à droite */
.hdr-container{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:25px; padding:0 5px;}
.hdr-main{text-align:left;}
.hdr-main h1{font-size:2.1rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.hdr-main p{color:var(--m);font-size:.7rem;margin-top:5px;}
.hdr-actions{display:flex; gap:10px; margin-top:5px;}
.btn-icon{background:var(--s); border:1px solid var(--b); color:var(--t); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.2rem;}

.saved{font-size:.7rem;color:#43e97b;text-align:center;display:block;margin: -10px 0 15px 0;opacity:0;transition:opacity .4s;}
.saved.show{opacity:1;}

/* Cartes */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.card.pu::before{background:#6c63ff;}.card.pi::before{background:#ff6584;}
.card.gr::before{background:#43e97b;}.card.or::before{background:#ff9f43;}
.cl{font-size:.62rem;color:var(--m);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-weight:600;}
.cv{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;}
.card.pu .cv{color:#6c63ff;}.card.pi .cv{color:#ff6584;}.card.gr .cv{color:#43e97b;}.card.or .cv{color:#ff9f43;}

/* Sections */
.sec{background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden;margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);cursor:pointer;}
.sh h2{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:6px;}
.bk{font-size:.65rem;padding:2px 8px;border-radius:20px;font-weight:600;}
.bk.pu{background:rgba(108,99,255,.15);color:#6c63ff;}
.bk.re{background:rgba(255,80,80,.15);color:#ff5050;}
.bk.or{background:rgba(255,159,67,.15);color:#ff9f43;}
.bk.cy{background:rgba(67,217,255,.15);color:#43d9ff;}
.bk.pi{background:rgba(255,101,132,.15);color:#ff6584;}
.bk.gr{background:rgba(67,233,123,.15);color:#43e97b;}

.cb{overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:8px 14px;font-size:.58rem;color:var(--m);text-transform:uppercase;background:rgba(255,255,255,0.02);}
td{padding:11px 14px;font-size:.82rem;border-bottom:1px solid var(--b);vertical-align:middle;}
.ta{text-align:right;font-family:'Syne',sans-serif;font-weight:600;}
.bd{background:none;border:none;cursor:pointer;color:var(--m);font-size:0.95rem;padding:5px;}
.ba{background:rgba(108,99,255,.05);border:1px dashed rgba(108,99,255,0.3);color:#6c63ff;border-radius:10px;padding:12px;font-size:.8rem;cursor:pointer;width:calc(100% - 28px);margin:10px 14px;}

/* Inputs Edition */
.ei{background:var(--s2);border:1px solid var(--a);color:var(--t);border-radius:6px;padding:4px 8px;font-family:inherit;font-size:0.85rem;outline:none;}
.ei.am{text-align:right;width:80px;font-family:'Syne',sans-serif;}

/* Modaux */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(10px);}
.mb{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:25px;width:100%;max-width:340px;}
.fi{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);border-radius:10px;padding:12px;margin-bottom:12px;outline:none;}
.mbt{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;}
.bc{background:var(--s2);border:none;color:var(--m);padding:12px;border-radius:10px;cursor:pointer;}
.bco{background:var(--a);border:none;color:#fff;padding:12px;border-radius:10px;cursor:pointer;font-weight:700;}
.data-box{width:100%;height:150px;background:#000;color:#43e97b;font-family:monospace;font-size:0.7rem;border-radius:10px;padding:10px;margin:15px 0;border:1px solid var(--b);}

.toolbar-save { position: fixed; bottom: 0; left: 0; right: 0; background: var(--s); border-top: 1px solid var(--b); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; z-index: 90;}
.btn-tool { padding: 12px; border-radius: 12px; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem; cursor: pointer; text-align: center;}
</style>
</head>
<body>

<div class="hdr-container">
  <div class="hdr-main">
    <h1>Mon Budget</h1>
    <p>Appuie sur un montant pour modifier</p>
  </div>
  <div class="hdr-actions">
    <button class="btn-icon" onclick="showExport()" title="Exporter">💾</button>
    <button class="btn-icon" onclick="showImport()" title="Importer">📥</button>
  </div>
</div>

<span class="saved" id="sv">✅ Mis à jour</span>

<div class="cards">
  <div class="card pu"><div class="cl">Total mensuel</div><div class="cv" id="ct">—</div></div>
  <div class="card pi"><div class="cl">Par quinzaine</div><div class="cv" id="ch">—</div></div>
  <div class="card gr"><div class="cl">Total annuel</div><div class="cv" id="ca">—</div></div>
  <div class="card or"><div class="cl">Charges fixes</div><div class="cv" id="cy">—</div></div>
</div>

<div id="sc"></div>

<div class="toolbar-save">
  <button class="btn-tool" style="background:var(--a); color:white;" onclick="showExport()">COPIER CODE</button>
  <button class="btn-tool" style="background:var(--s2); color:var(--m); border:1px solid var(--b);" onclick="showImport()">IMPORTER DATA</button>
</div>

<div class="mo" id="modal">
  <div class="mb">
    <h3>➕ Ajouter</h3>
    <input class="fi" id="nn" placeholder="Nom (ex: Netflix)">
    <div style="display:grid; grid-template-columns: 1fr 2fr; gap:10px;">
      <input class="fi" id="ne" placeholder="Emoji">
      <input class="fi" id="na" type="number" step="0.01" placeholder="Montant €">
    </div>
    <div class="mbt">
      <button class="bc" onclick="cM()">Annuler</button>
      <button class="bco" onclick="confAdd()">Ajouter ✓</button>
    </div>
  </div>
</div>

<div class="mo" id="modal-save">
  <div class="mb">
    <h3 id="ms-title">Sauvegarde</h3>
    <textarea class="data-box" id="ms-box" spellcheck="false"></textarea>
    <div class="mbt">
      <button class="bc" onclick="document.getElementById('modal-save').style.display='none'">Fermer</button>
      <button class="bco" id="ms-btn-action" style="display:none">Valider ✓</button>
    </div>
  </div>
</div>

<script>
let ctr=Date.now();
function uid(){return 'x'+(++ctr);}

// DONNÉES INJECTÉES EXACTES DEPUIS TON MESSAGE
const DEF={
  sections:[
    {id:'s1',icon:'🏠',title:'Logement & Énergie',cl:'pu',rows:[
      {id:'r1',e:'🏠',n:'Crédit maison',a:552.80},
      {id:'r2',e:'⚡️',n:'Electricité / gaz',a:120.00},
      {id:'r3',e:'💦',n:'Eau',a:35.78},
      {id:'r4',e:'🛜',n:'Internet',a:70.00},
      {id:'r5',e:'⚡️',n:'Energy',a:0.99},
    ]},
    {id:'s2',icon:'💳',title:'Crédits',cl:'re',rows:[
      {id:'r6',e:'💳',n:'Buy Way',a:124.00},
    ]},
    {id:'s3',icon:'🛡',title:'Assurances',cl:'or',rows:[
      {id:'r7',e:'🔥',n:'Assurance incendie',a:52.54},
      {id:'r8',e:'🏥',n:'Mutuelle',a:13.50},
      {id:'r9',e:'🤝',n:'CSC',a:21.90},
      {id:'r10',e:'💀',n:'Dela',a:10.97},
      {id:'r11',e:'🛡',n:'AXA',a:39.25},
      {id:'r12',e:'🚨',n:'Verisure',a:53.99},
    ]},
    {id:'s4',icon:'📱',title:'Télécom',cl:'cy',rows:[
      {id:'r13',e:'📱',n:'Téléphone',a:114.99},
    ]},
    {id:'s5',icon:'📺',title:'Loisirs & Subs',cl:'pi',rows:[
      {id:'r14',e:'📺',n:'Tv',a:30.00},
      {id:'r15',e:'📦',n:'Amazon',a:9.98},
      {id:'r16',e:'🎬',n:'Netflix',a:14.99},
      {id:'r17',e:'🎵',n:'Apple music',a:10.99},
      {id:'r18',e:'🏰',n:'Disney +',a:15.99},
      {id:'r19',e:'🤖',n:'iCloud',a:2.99},
      {id:'r20',e:'🎮',n:'Ps5',a:13.99},
    ]},
    {id:'s6',icon:'🛒',title:'Consommation',cl:'gr',rows:[
      {id:'r21',e:'🛒',n:'Course',a:120.00},
    ]},
  ],
  annual:[
    {id:'a1',n:'Cadastre',m:'Octobre',a:604.00},
    {id:'a2',n:'Assurance vie',m:'Janvier',a:142.89},
    {id:'a3',n:'Taxe poubelle',m:'Avril',a:220.00},
    {id:'a4',n:'Taxe égout',m:'Juillet',a:20.00},
  ],
  col:{}
};

let ST;
try{ const r=localStorage.getItem('bdg_v4'); ST=r?JSON.parse(r):JSON.parse(JSON.stringify(DEF)); }
catch(e){ ST=JSON.parse(JSON.stringify(DEF)); }

function save(){
  localStorage.setItem('bdg_v4',JSON.stringify(ST));
  const s=document.getElementById('sv'); s.classList.add('show'); setTimeout(()=>s.classList.remove('show'),2000);
}

function fmt(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:2})+' €'; }
function secTot(sec){ return sec.rows.reduce((s,r)=>s+r.a,0); }
function mTot(){ return ST.sections.reduce((s,sec)=>s+secTot(sec),0); }
function aTot(){ return ST.annual.reduce((s,r)=>s+r.a,0); }

function updCards(){
  document.getElementById('ct').textContent=fmt(mTot());
  document.getElementById('ch').textContent=fmt(mTot()/2);
  document.getElementById('ca').textContent=fmt(mTot()*12);
  document.getElementById('cy').textContent=fmt(aTot());
}

function render(){
  updCards();
  const c=document.getElementById('sc'); c.innerHTML='';
  ST.sections.forEach(sec=>{
    const tot=secTot(sec); const isC=ST.col[sec.id];
    const div=document.createElement('div'); div.className='sec';
    div.innerHTML=`<div class="sh" onclick="tS('${sec.id}')"><h2>${sec.icon} ${sec.title} <span class="bk ${sec.cl}">${fmt(tot)}</span></h2><span>▾</span></div>
    <div class="cb" id="cb-${sec.id}" style="max-height:${isC?'0px':'none'}">
      <table><thead><tr><th>Facture</th><th class="ta">Montant</th><th></th></tr></thead>
      <tbody>${sec.rows.map(r=>`<tr>
        <td><span onclick="eN('${sec.id}','${r.id}',this)">${r.e?r.e+' ':''}${r.n}</span></td>
        <td class="ta"><span onclick="eA('${sec.id}','${r.id}',this)">${fmt(r.a)}</span></td>
        <td style="width:35px"><button class="bd" onclick="dR('${sec.id}','${r.id}')">🗑</button></td>
      </tr>`).join('')}</tbody></table>
      <button class="ba" onclick="oM('${sec.id}')">➕ Ajouter un poste</button>
    </div>`;
    c.appendChild(div);
  });
  
  const aDiv=document.createElement('div'); aDiv.className='sec';
  aDiv.innerHTML=`<div class="sh" onclick="tS('annual')"><h2>📅 Charges Annuelles <span class="bk or">${fmt(aTot())}</span></h2><span>▾</span></div>
  <div class="cb" id="cb-annual" style="max-height:${ST.col['annual']?'0px':'none'}">
    <table><thead><tr><th>Charge</th><th>Echéance</th><th class="ta">Montant</th><th></th></tr></thead>
    <tbody>${ST.annual.map(r=>`<tr>
      <td><span onclick="eAN('${r.id}',this)">${r.n}</span></td>
      <td style="color:var(--m); font-size:.7rem"><span onclick="eAM('${r.id}',this)">${r.m}</span></td>
      <td class="ta"><span onclick="eAA('${r.id}',this)">${fmt(r.a)}</span></td>
      <td style="width:35px"><button class="bd" onclick="dA('${r.id}')">🗑</button></td>
    </tr>`).join('')}</tbody></table>
    <button class="ba" onclick="addA()">➕ Ajouter une taxe/assurance annuelle</button>
  </div>`;
  c.appendChild(aDiv);
}

function tS(id){ const cb=document.getElementById('cb-'+id); const open=cb.style.maxHeight!=='0px'; ST.col[id]=open; cb.style.maxHeight=open?'0px':'none'; save(); }

// Fonctions d'édition
function eN(sid,rid,el){ 
  const r=ST.sections.find(s=>s.id===sid).rows.find(r=>r.id===rid);
  const i=document.createElement('input'); i.className='ei'; i.value=r.n; el.replaceWith(i); i.focus();
  i.onblur=()=>{ r.n=i.value; render(); save(); };
}
function eA(sid,rid,el){ 
  const r=ST.sections.find(s=>s.id===sid).rows.find(r=>r.id===rid);
  const i=document.createElement('input'); i.className='ei am'; i.type='number'; i.value=r.a; el.replaceWith(i); i.focus();
  i.onblur=()=>{ r.a=parseFloat(i.value)||0; render(); save(); };
}
function eAN(id,el){ const r=ST.annual.find(r=>r.id===id); const i=document.createElement('input'); i.className='ei'; i.value=r.n; el.replaceWith(i); i.focus(); i.onblur=()=>{ r.n=i.value; render(); save(); }; }
function eAM(id,el){ const r=ST.annual.find(r=>r.id===id); const i=document.createElement('input'); i.className='ei'; i.value=r.m; el.replaceWith(i); i.focus(); i.onblur=()=>{ r.m=i.value; render(); save(); }; }
function eAA(id,el){ const r=ST.annual.find(r=>r.id===id); const i=document.createElement('input'); i.className='ei am'; i.type='number'; i.value=r.a; el.replaceWith(i); i.focus(); i.onblur=()=>{ r.a=parseFloat(i.value)||0; render(); save(); }; }

function dR(sid,rid){ if(confirm('Supprimer cette ligne ?')){ const s=ST.sections.find(x=>x.id===sid); s.rows=s.rows.filter(r=>r.id!==rid); render(); save(); } }
function dA(id){ if(confirm('Supprimer ?')){ ST.annual=ST.annual.filter(r=>r.id!==id); render(); save(); } }
function addA(){ ST.annual.push({id:uid(),n:'Nouvelle taxe',m:'Janvier',a:0}); render(); save(); }

let mSec=null;
function oM(sid){ mSec=sid; document.getElementById('modal').style.display='flex'; }
function cM(){ document.getElementById('modal').style.display='none'; }
function confAdd(){ 
  const n=document.getElementById('nn').value, a=parseFloat(document.getElementById('na').value), e=document.getElementById('ne').value;
  if(n && !isNaN(a)){ ST.sections.find(s=>s.id===mSec).rows.push({id:uid(),e,n,a}); cM(); render(); save(); }
}

function showExport(){
  const box=document.getElementById('ms-box');
  box.value=JSON.stringify(ST);
  document.getElementById('ms-title').innerText="Données copiées";
  document.getElementById('ms-btn-action').style.display='none';
  document.getElementById('modal-save').style.display='flex';
  box.select();
  navigator.clipboard.writeText(box.value);
}
function showImport(){
  const box=document.getElementById('ms-box');
  box.value="";
  document.getElementById('ms-title').innerText="Coller les données";
  document.getElementById('ms-btn-action').style.display='block';
  document.getElementById('modal-save').style.display='flex';
  document.getElementById('ms-btn-action').onclick=()=>{
    try{ const d=JSON.parse(box.value); if(d.sections){ ST=d; render(); save(); document.getElementById('modal-save').style.display='none'; } } catch(e){ alert("Erreur de format !"); }
  };
}

render();
</script>
</body>
</html>
