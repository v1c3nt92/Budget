<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>💰 Budget Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--s:#17171f;--s2:#1e1e28;--b:#2a2a38;--a:#6c63ff;--t:#f0f0f8;--m:#7a7a9a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;padding:18px 13px 40px;}
h1,h2{font-family:'Syne',sans-serif;}

.hdr{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--b); padding-bottom:10px;}
.hdr-titles h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-tools{display:flex; gap:10px;}
.btn-icon{background:var(--s); border:1px solid var(--b); color:var(--t); width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer;}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:13px;padding:13px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:13px 13px 0 0;}
.card.pu::before{background:#6c63ff;}.card.pi::before{background:#ff6584;}
.card.gr::before{background:#43e97b;}.card.or::before{background:#ff9f43;}
.cl{font-size:.64rem;color:var(--m);text-transform:uppercase;margin-bottom:3px;}
.cv{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;}

#export-zone { display:none; background:var(--s2); border:1px solid var(--a); padding:10px; border-radius:10px; margin-bottom:15px; }
#export-text { width:100%; height:60px; background:transparent; color:var(--a); border:none; font-size:0.7rem; outline:none; }

.sec{background:var(--s);border:1px solid var(--b);border-radius:15px;overflow:hidden;margin-bottom:11px;}
.sh{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);background:rgba(255,255,255,0.02);}
.sh h2{font-size:.88rem;font-weight:700;}
.bk{font-size:.67rem;padding:2px 8px;border-radius:20px;font-weight:700;background:rgba(108,99,255,.18);color:#6c63ff;}

table{width:100%;border-collapse:collapse;}
td{padding:12px 14px;font-size:.85rem;border-bottom:1px solid var(--b); cursor:pointer;}
.ta{text-align:right;font-family:'Syne',sans-serif;font-weight:600;}
.bd{background:none;border:none;color:var(--m);cursor:pointer;padding:5px;}
.ba{background:rgba(108,99,255,.05);border:1px dashed var(--a);color:var(--a);border-radius:10px;padding:12px;font-size:.8rem;cursor:pointer;width:calc(100% - 28px);margin:10px 14px;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:15px;backdrop-filter:blur(5px);}
.mb{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:25px;width:100%;max-width:350px;}
.fi{width:100%;background:var(--s2);border:1px solid var(--b);color:var(--t);border-radius:10px;padding:12px;margin-bottom:12px;outline:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-titles"><h1>Mon Budget</h1></div>
  <div class="hdr-tools">
    <button class="btn-icon" onclick="toggleExport()">💾</button>
    <button class="btn-icon" onclick="showImport()">📥</button>
  </div>
</div>

<div id="export-zone">
    <p style="font-size:0.7rem; color:var(--m); margin-bottom:5px;">Code de sauvegarde (Copie-le) :</p>
    <textarea id="export-text" readonly onclick="this.select()"></textarea>
</div>

<div class="cards">
  <div class="card pu"><div class="cl">Mensuel</div><div class="cv" id="ct">0.00 €</div></div>
  <div class="card pi"><div class="cl">Quinzaine</div><div class="cv" id="ch">0.00 €</div></div>
  <div class="card gr"><div class="cl">Annuel</div><div class="cv" id="ca">0.00 €</div></div>
  <div class="card or"><div class="cl">Total Dettes</div><div class="cv" id="cd">0.00 €</div></div>
</div>

<div id="sc"></div>

<div class="ap" style="margin-top:10px;">
    <button class="ba" style="background:rgba(67,233,123,0.1); border-color:#43e97b; color:#43e97b;" onclick="addCategory()">📁 Nouvelle catégorie</button>
</div>

<div class="mo" id="modal">
  <div class="mb">
    <h3 style="margin-bottom:15px; font-family:Syne;">➕ Ajouter</h3>
    <input class="fi" id="nn" placeholder="Nom">
    <input class="fi" id="na" type="number" step="0.01" placeholder="Montant">
    <input class="fi" id="ne" placeholder="Emoji">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
      <input type="checkbox" id="is-plan"> <span style="font-size:0.8rem">Échéancier (Dette)</span>
    </div>
    <div id="plan-opt" style="display:none; margin-bottom:15px;">
      <input class="fi" id="n-months" type="number" placeholder="Nombre de mois">
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="fi" onclick="closeModal()">Annuler</button>
      <button class="fi" style="background:var(--a); color:white;" onclick="saveItem()">Valider</button>
    </div>
  </div>
</div>

<script>
document.getElementById('is-plan').onchange = (e) => document.getElementById('plan-opt').style.display = e.target.checked ? 'block' : 'none';

let ST = JSON.parse(localStorage.getItem('bdg_vfinal')) || {
  sections: [
    {id:'s1', icon:'🏠', title:'Logement', rows:[{n:'Crédit maison', a:552.80, e:'🏠'},{n:'Électricité', a:145.69, e:'⚡'}]},
    {id:'s2', icon:'💳', title:'Crédits', rows:[{n:'Buy Way', a:124.00, e:'💳'}]}
  ]
};

function fmt(n) { return n.toLocaleString('fr-FR', {minimumFractionDigits:2}) + ' €'; }

function render() {
  const container = document.getElementById('sc');
  container.innerHTML = '';
  let tM = 0; let tD = 0;

  ST.sections.forEach(sec => {
    let sT = 0;
    let rowsHtml = sec.rows.map((r, idx) => {
      tM += r.a; sT += r.a;
      if(r.isP) tD += (r.a * r.ml);
      return `<tr>
        <td onclick="editRow('${sec.id}', ${idx})">
          ${r.isP ? `<span style="font-size:0.6rem; color:var(--m)">Reste ${fmt(r.a * r.ml)}</span><br>` : ''}
          <b>${r.e || '💸'} ${r.n}</b>
        </td>
        <td class="ta" onclick="editRow('${sec.id}', ${idx})">${fmt(r.a)}</td>
        <td style="width:40px; text-align:right"><button class="bd" onclick="delRow('${sec.id}', ${idx})">🗑</button></td>
      </tr>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'sec';
    div.innerHTML = `
      <div class="sh"><h2>${sec.icon} ${sec.title}</h2> <div style="display:flex;gap:10px"><span class="bk">${fmt(sT)}</span><button class="bd" onclick="delCat('${sec.id}')">🗑</button></div></div>
      <table>${rowsHtml}</table>
      <button class="ba" onclick="openModal('${sec.id}')">➕ Ajouter une ligne</button>`;
    container.appendChild(div);
  });

  document.getElementById('ct').innerText = fmt(tM);
  document.getElementById('ch').innerText = fmt(tM/2);
  document.getElementById('ca').innerText = fmt(tM * 12);
  document.getElementById('cd').innerText = fmt(tD);
  localStorage.setItem('bdg_vfinal', JSON.stringify(ST));
}

function openModal(sid) { curSid = sid; document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveItem() {
  const n = document.getElementById('nn').value, a = parseFloat(document.getElementById('na').value);
  if(n && a) {
    const isP = document.getElementById('is-plan').checked;
    ST.sections.find(s => s.id === curSid).rows.push({ n, a, e: document.getElementById('ne').value || '💸', isP, ml: isP ? parseInt(document.getElementById('n-months').value)||1 : 0 });
    render(); closeModal();
  }
}

function editRow(sid, idx) {
    let r = ST.sections.find(s => s.id === sid).rows[idx];
    let newN = prompt("Nom de la facture :", r.n);
    if(newN) r.n = newN;
    let newA = prompt("Montant (€) :", r.a);
    if(newA) r.a = parseFloat(newA);
    if(r.isP) { let newM = prompt("Mois restants :", r.ml); if(newM) r.ml = parseInt(newM); }
    render();
}

function delRow(sid, i) { if(confirm('Supprimer ?')) { ST.sections.find(s => s.id === sid).rows.splice(i,1); render(); } }
function delCat(sid) { if(confirm('Supprimer catégorie ?')) { ST.sections = ST.sections.filter(s => s.id !== sid); render(); } }
function addCategory() { let t = prompt("Nom ?"); if(t) { ST.sections.push({id:'s'+Date.now(), icon:'📁', title:t, rows:[]}); render(); } }

function toggleExport() {
    const zone = document.getElementById('export-zone');
    const text = document.getElementById('export-text');
    zone.style.display = zone.style.display === 'none' ? 'block' : 'none';
    text.value = btoa(JSON.stringify(ST));
}

function showImport() {
    let c = prompt("Colle ton code ici :");
    if(c) { try { ST = JSON.parse(atob(c)); render(); } catch(e) { alert("Code invalide"); } }
}

render();
</script>
</body>
</html>
